name: dotnet tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "Plan/**"
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "Plan/**"
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Run runtime test suite
        run: dotnet test Packages/dev.unity2rerun.sdk/Tests/Runtime/Unity.RerunSDK.Core.Tests/Unity.RerunSDK.Core.Tests.csproj
